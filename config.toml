baseURL = "https://blog.prabeeshk.com/"
languageCode = "en-us"
title = "This is One of the Solutions"
description = "A technical blog covering programming, data engineering, Apache Spark, embedded systems, CUDA programming, and software development best practices. Practical tutorials and insights for developers."
theme = "ananke"
enableRobotsTXT = true
MetaDataFormat = "yaml"
DefaultContentLanguage = "en"
SectionPagesMenu = "main"

# Performance optimizations (Core Web Vitals). GitHub Pages serves as CDN for faster delivery.
enableGitInfo = false
enableEmoji = false
disableKinds = ["taxonomy", "term"]

# SEO optimizations
canonifyURLs = true
rssLimit = 20

# Enable fingerprinting for better caching
[params.assets]
  fingerprint = "sha256"
  
# Cache busting for resources
[params.cache]
  enable = true
  version = "v2.1"

# Updated pagination configuration
[pagination]
pagerSize = 9

# Fix deprecated permalink token
[permalinks]
    blog = "/blog/:year/:month/:day/:contentbasename/"
    bonus = "/bonus/:contentbasename/"

[params]
    favicon = "/images/favicon.png"
    recent_posts_number = 15
    twitter = "https://twitter.com/prabeesh_k"
    linkedin = "https://www.linkedin.com/in/prabeeshk/"
    show_reading_time = true
    
    # Google Analytics - add your actual GA4 ID here
    google_analytics = "G-PECLCLL5R6"  # Your actual GA4 measurement ID
     
    # Social media and SEO
    twitter_creator = "@prabeesh_k"
    twitter_site = "@prabeesh_k"
    
    # OpenGraph and Schema.org settings
    images = ["/images/og-image.png"]
    author = "Prabeesh Keezhathra"
    
    # Performance
    enable_minify = true
    enable_gzip = true
    enable_brotli = true
    enable_resource_hints = true
    enable_critical_css = true

# Disqus configuration - new format
[services]
[services.disqus]
    Shortname = "prabeeshk"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"
    lineNos = true
    lineNumbersInTable = false
    codeFences = true

# Enhanced sitemap configuration
[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

# Output formats for better performance and SEO
[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "feed"
    isPlainText = true
    notAlternative = true
  [outputFormats.SearchIndex]
    mediaType = "application/json"
    baseName = "search"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "SearchIndex"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

# Minify configuration
[minify]
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepConditionalComments = true
      keepDefaultAttrVals = true
      keepDocumentTags = true
      keepEndTags = true
      keepQuotes = true
      keepWhitespace = false
    [minify.tdewolff.css]
      keepCSS2 = true
      precision = 0
    [minify.tdewolff.js]
      keepVarNames = false
      precision = 0
    [minify.tdewolff.svg]
      keepComments = false
      precision = 1

# Privacy configuration
[privacy]
  [privacy.disqus]
    disable = false
  [privacy.googleAnalytics]
    disable = false
    respectDoNotTrack = true
    anonymizeIP = true
  [privacy.youtube]
    disable = false
    privacyEnhanced = true

# Related content settings
[related]
  threshold = 80
  includeNewer = true
  toLower = false
  [[related.indices]]
    name = "keywords"
    weight = 150
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "date"
    weight = 10
