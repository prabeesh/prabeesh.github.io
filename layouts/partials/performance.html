{{/* DNS Prefetch only when ads are about to load */}}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const prefetchAds = () => {
    const link = document.createElement('link');
    link.rel = 'dns-prefetch';
    link.href = '//pagead2.googlesyndication.com';
    document.head.appendChild(link);
  };
  
  // Prefetch when user shows intent to interact
  ['scroll', 'mousemove'].forEach(event => {
    document.addEventListener(event, prefetchAds, { once: true, passive: true });
  });
});
</script>

{{/* Enhanced Critical CSS for above-the-fold content */}}
<style>
/* System font stack - no web fonts to prevent CLS */
body, .avenir {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif !important;
  line-height: 1.6;
  color: #333;
  margin: 0;
  padding: 0;
}

/* Critical layout styles */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1rem;
}

/* Performance-first image handling */
img, video, iframe {
  max-width: 100%;
  height: auto;
  display: block;
}

/* CLS prevention - reserve space for all dynamic content */
.site-header {
  min-height: 120px;
}

.site-header h1 {
  min-height: 3rem;
}

.site-header h2 {
  min-height: 2rem;
}

.site-navigation {
  min-height: 60px;
}

/* Loading states to prevent CLS */
.loading-skeleton {
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: loading 1.5s infinite;
}

@keyframes loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Reading progress - optimized for performance */
.reading-progress {
  position: fixed;
  top: 0;
  left: 0;
  width: 0%;
  height: 2px;
  background: #007bff;
  z-index: 1000;
  will-change: width;
  transform: translateZ(0); /* GPU acceleration */
}

/* Reduce motion for accessibility and performance */
@media (prefers-reduced-motion: reduce) {
  *, ::before, ::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  
  .loading-skeleton {
    animation: none;
  }
}

/* Focus management for accessibility */
a:focus, button:focus, input:focus, textarea:focus {
  outline: 2px solid #007bff;
  outline-offset: 2px;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
</style>

{{/* Optimized service worker - load after everything else */}}
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    if ('requestIdleCallback' in window) {
      requestIdleCallback(() => {
        navigator.serviceWorker.register('/sw.js', { 
          scope: '/',
          updateViaCache: 'imports'
        }).catch(() => {});
      });
    } else {
      setTimeout(() => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }, 2000);
    }
  });
}
</script>
