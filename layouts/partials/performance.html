{{/* Critical CSS inline */}}
<style>
/* Critical above-the-fold styles */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  line-height: 1.6;
  color: #333;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1rem;
}

/* Loading skeleton */
.skeleton {
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: loading 1.5s infinite;
}

@keyframes loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Font display swap for better performance */
@font-face {
  font-family: 'CustomFont';
  font-display: swap;
  src: url('/fonts/custom-font.woff2') format('woff2');
}
</style>

<!-- Enhanced Resource Hints -->
<link rel="preconnect" href="https://blog.prabeeshk.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.google-analytics.com" crossorigin>
<link rel="preconnect" href="https://pagead2.googlesyndication.com" crossorigin>

<!-- DNS Prefetch for additional domains -->
<link rel="dns-prefetch" href="//www.googletagmanager.com">
<link rel="dns-prefetch" href="//www.google-analytics.com">
<link rel="dns-prefetch" href="//fonts.googleapis.com">
<link rel="dns-prefetch" href="//fonts.gstatic.com">
<link rel="dns-prefetch" href="//pagead2.googlesyndication.com">

<!-- Preload critical resources - Use Hugo's actual CSS path -->
{{ $css := partialCached "func/style/GetMainCSS" "style/GetMainCSS" }}
{{ if $css }}
<link rel="preload" href="{{ $css.RelPermalink }}" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="{{ $css.RelPermalink }}"></noscript>
{{ end }}

<!-- Preload fonts -->
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Avenir:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Avenir:wght@400;500;600;700&display=swap"></noscript>

{{/* INP: Service worker deferred to load event to keep main thread free for user interactions. Lazy-loading logic lives only in lazy-loading.html to avoid duplicate JS. */}}
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js')
      .then(function(registration) { /* SW registered */ })
      .catch(function() { /* SW registration failed */ });
  });
}
</script>
