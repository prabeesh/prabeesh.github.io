{{/* Auto Ads: load AdSense on every page; Analytics deferred on interaction */}}
<script>
  let adSenseLoaded = false;
  let analyticsLoaded = false;
  
  function loadAdSense() {
    if (adSenseLoaded) return;
    adSenseLoaded = true;
    const s = document.createElement('script');
    s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1368619820510426';
    s.crossOrigin = 'anonymous';
    s.async = true;
    document.head.appendChild(s);
  }
  
  function loadAnalytics() {
    if (analyticsLoaded) return;
    analyticsLoaded = true;
    
    {{ if .Site.Params.google_analytics }}
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    
    const gtagScript = document.createElement('script');
    gtagScript.src = 'https://www.googletagmanager.com/gtag/js?id={{ .Site.Params.google_analytics }}';
    gtagScript.async = true;
    document.head.appendChild(gtagScript);
    
    gtagScript.onload = function() {
      gtag('config', '{{ .Site.Params.google_analytics }}', {
        transport_type: 'beacon',
        send_page_view: true
      });
    };
    {{ end }}
  }
  
  ['scroll', 'click', 'keydown'].forEach(function(evt) {
    document.addEventListener(evt, function handler() {
      loadAdSense();
      loadAnalytics();
      document.removeEventListener(evt, handler);
    }, { once: true, passive: true });
  });
  
  setTimeout(function() { loadAdSense(); loadAnalytics(); }, 3000);
</script>

<style>
html { scroll-behavior: smooth; }
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
.reading-progress {
  position: fixed;
  top: 0;
  left: 0;
  width: 0%;
  height: 2px;
  background: #007bff;
  z-index: 1000;
}
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
}
</style>
